name: Deploy slides to Pages

on:
  push:
    branches: ["main"]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
      - run: npm install

      - name: Build every deck (each <folder>/slides.md)
        run: |
          REPO="${{ github.event.repository.name }}"
          rm -rf dist
          for md in $(find . -path ./node_modules -prune -o -name slides.md -print); do
            deck="${md#./}"; deck="${deck%/slides.md}"
            echo "==> building $deck"
            # Slidev's --out is relative to the slides.md folder, so use an absolute path
            npx slidev build "$md" --base "/$REPO/$deck/" --out "$PWD/dist/$deck"
          done

      - name: Root page (no deck listing — direct links only)
        run: |
          # Intentionally do NOT enumerate decks. Anyone hitting the repo root
          # gets sent to the homepage instead of a list of every talk.
          printf '%s' '<!doctype html><meta charset="utf-8"><meta http-equiv="refresh" content="0; url=https://patrickchang.net/"><title>Redirecting…</title>' > dist/index.html

      - uses: actions/configure-pages@v5
      - uses: actions/upload-pages-artifact@v3
        with:
          path: dist
      - id: deployment
        uses: actions/deploy-pages@v4
